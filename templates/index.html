<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>DMラベル作成ツール</title>
    <style>
        body { font-family: sans-serif; margin: 40px; line-height: 1.6; }
        .box { border: 1px solid #ccc; padding: 20px; border-radius: 8px; max-width: 500px; }
        input[type="text"], input[type="file"] { display: block; margin: 10px 0; }
        button { background-color: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>DMラベル作成ツール</h1>
    <div class="box">
        <form method="post" enctype="multipart/form-data">
            <label>会社から届いたCSVファイルを選択:</label>
            <input type="file" name="files" multiple required>
            
            <label>区分を入力（例：上客、尾関など）:</label>
            <input type="text" name="category" placeholder="上客" required>
            
            <button type="submit">CSV変換してダウンロード</button>
        </form>
    </div>
</body>
</html>
